<!doctype html>
<html lang="en">
<head>
<link rel="icon" type="image/png" href="favicon.png">
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
<title>ColoringPixelsOnline</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<style>
  :root{--accent:#3D2CDE;--bg:#1a1a1a;--sidebar-w:260px;--muted:#6b7280}
  body, html { margin:0; padding:0; height:100%; width:100%; font-family:Inter,system-ui,Arial; background:var(--bg); color:white; overflow:hidden; touch-action:none; }
  #authOverlay { position:fixed; inset:0; background:#111; z-index:10000; display:flex; align-items:center; justify-content:center; }
  .auth-box { background:#222; padding:30px; border-radius:12px; width:90%; max-width:340px; display:flex; flex-direction:column; gap:12px; border:1px solid #333; }
  .auth-box h2 { text-align:center; margin:0; }
  .auth-tab { display:flex; gap:8px; }
  .auth-tab button { background:#333; font-size:12px; }
  .auth-tab button.active { background:var(--accent); }
  input, button { padding:12px; border-radius:6px; border:1px solid #444; font-size:14px; background:#333; color:white; width:100%; box-sizing:border-box; }
  button { background:var(--accent); border:none; font-weight:bold; cursor:pointer; }
  #authError { color:#f87171; font-size:12px; text-align:center; display:none; }
  #nav { height:50px; background:var(--accent); display:flex; align-items:center; justify-content:space-between; padding:0 15px; border-bottom:1px solid rgba(0,0,0,0.1); font-size:13px; font-weight:bold; }
  #mainApp { display:none; height:100%; width:100%; flex-direction:column; }
  #layout { flex:1; display:flex; position:relative; overflow:hidden; }
  #canvasWrap { flex:1; display:flex; align-items:center; justify-content:center; background:#f8fafc; overflow:hidden; position:relative; }
  #canvas { background:#fff; image-rendering:pixelated; box-shadow:0 8px 24px rgba(0,0,0,0.2); outline:none; }
  #sidebar { width:var(--sidebar-w); background:#222; padding:15px; display:flex; flex-direction:column; gap:8px; border-left:1px solid #333; overflow-y:auto; color:lightblue; }
  .tool { background:rgba(255,255,255,0.05); padding:10px; text-align:center; border-radius:8px; cursor:pointer; font-size:13px; border:1px solid rgba(255,255,255,0.1); color:#fff; width:100%; margin-bottom:4px; }
  .tool.active { background:var(--accent); border-color:white; }
  #palette { display:grid; grid-template-columns:repeat(5, 1fr); gap:6px; margin:10px 0; }
  .swatch { aspect-ratio:1; border-radius:4px; border:1px solid rgba(0,0,0,0.3); cursor:pointer; }
  input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; margin: 10px 0; }
  input[type=range]:focus { outline: none; }
  input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 8px; cursor: pointer; background: #444; border-radius: 4px; }
  input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 18px; width: 18px; border-radius: 50%; background: var(--accent); cursor: pointer; margin-top: -5px; }
  input[type=range]::-moz-range-track { width: 100%; height: 8px; cursor: pointer; background: #444; border-radius: 4px; }
  input[type=range]::-moz-range-thumb { height: 18px; width: 18px; border-radius: 50%; background: var(--accent); cursor: pointer; border: none; }
  #saveMenu { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:#fff; color:#333; border:3px solid var(--accent); padding:20px; display:none; z-index:11000; width:440px; border-radius:12px; box-shadow:0 10px 50px rgba(0,0,0,0.5); }
  .save-slot { display:flex; justify-content:space-between; align-items:center; padding:10px; border-bottom:1px solid #eee; font-size:14px; color:#333; }
  #menuSaveBtn { background: #28a745 !important; color: white !important; border: 1px solid #1e7e34 !important; font-weight: bold; cursor: pointer; }
  .load-btn { background: #007bff !important; color: white !important; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; }
  .del-btn { background: #dc3545 !important; color: white !important; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; margin-left: 5px; }
  @media (max-width: 600px) { #sidebar { display:none; } }
</style>
</head>
<body>
<div id="authOverlay">
  <div class="auth-box">
    <h2>ColoringPixels</h2>
    <div class="auth-tab">
      <button id="tabLogin" class="active" onclick="showTab('login')">Login</button>
      <button id="tabSignup" onclick="showTab('signup')">Create Account</button>
    </div>
    <input type="email" id="emailIn" placeholder="Email">
    <input type="password" id="passIn" placeholder="Password">
    <input type="text" id="lobbyIn" placeholder="Lobby Name (optional)">
    <div id="authError"></div>
    <button id="authBtn">Login</button>
    <div style="display:flex;align-items:center;gap:8px;margin:4px 0"><hr style="flex:1;border-color:#444"><span style="color:#888;font-size:12px">or</span><hr style="flex:1;border-color:#444"></div>
    <button id="googleBtn" style="background:#fff;color:#333;display:flex;align-items:center;justify-content:center;gap:10px;font-size:14px;">
      <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/><path fill="none" d="M0 0h48v48H0z"/></svg>
      Sign in with Google
    </button>
  </div>
</div>
<div id="mainApp">
  <div id="nav">
    <div>User: <span id="accountName">...</span></div>
    <div id="lobbyLabel">Lobby: ...</div>
    <div id="status" style="color:#dbeafe">Peers: 0</div>
    <button onclick="logout()" style="width:auto; padding:5px 10px; font-size:11px">Exit</button>
  </div>
  <div id="layout">
    <div id="canvasWrap"><canvas id="canvas" tabindex="0"></canvas></div>
    <div id="sidebar">
      <div class="label">Tools</div>
      <button class="tool active" id="brushBtn">Brush</button>
      <button class="tool" id="eraserBtn">Eraser</button>
      <button class="tool" id="fillBtn">Flood Fill</button>
      <div style="display:flex; gap:5px"><button class="tool" id="undoBtn">Undo</button><button class="tool" id="redoBtn">Redo</button></div>
      <div id="palette"></div>
      <div style="display:flex; gap:4px">
        <input type="text" id="hexInput" placeholder="HEX" style="width:60%; padding:8px; font-size:12px">
        <input type="color" id="picker" style="width:40%; height:34px; cursor:pointer">
      </div>
      <div class="label">Grid Size</div>
      <input type="range" id="sizeRange" min="8" max="64" value="64">
      <div id="sizeLabel" style="text-align:center; font-size:11px; margin-bottom:10px;">64 x 64</div>
      <button class="tool" id="exportBtn">Export PNG</button>
      <button class="tool" id="openSaveMenuBtn" style="background:var(--accent)">Load/Save Menu</button>
      <button class="tool" id="wipeBtn" style="background:#800">Wipe Board</button>
    </div>
  </div>
</div>
<div id="saveMenu">
  <h3 style="margin-top:0; color:var(--accent)">Cloud Storage</h3>
  <div style="display:flex; gap:6px; margin-bottom:15px;">
    <input id="menuSaveName" placeholder="New Save Name..." style="flex:1; padding:8px; background:#f9f9f9; color:#333; border:1px solid #ccc; border-radius:4px;">
    <button id="menuSaveBtn" style="width:auto; padding:8px 15px;">Save Now</button>
  </div>
  <div id="slotList" style="max-height:300px; overflow-y:auto; margin:10px 0; border-top:1px solid #eee;"></div>
  <button id="exitSaveMenuBtn" class="tool" style="background:#666; margin-top:10px;">Close Menu</button>
</div>
<script>
  const SUPABASE_URL = 'https://wkjxmmjcdknjwvvbmnkp.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_t4lLSlKfleiGVWtN7chPxA_QD2anmwU';
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  let currentUser = null;
  let peer, lobbyID, connections = {};
  let GRID_SIZE = 64;
  let grid = Array.from({length:GRID_SIZE},()=>Array(GRID_SIZE).fill('#FFFFFF'));
  let history = [], redoStack = [], tool = 'brush', currentColor = '#000000', isDown = false;
  let isHost = false, lastX = null, lastY = null;
  const canvas = document.getElementById('canvas'), ctx = canvas.getContext('2d');

  let authMode = 'login';
  function showTab(mode) {
    authMode = mode;
    document.getElementById('tabLogin').classList.toggle('active', mode === 'login');
    document.getElementById('tabSignup').classList.toggle('active', mode === 'signup');
    document.getElementById('authBtn').textContent = mode === 'login' ? 'Login' : 'Create Account';
    document.getElementById('authError').style.display = 'none';
  }

  function showError(msg) {
    const el = document.getElementById('authError');
    el.textContent = msg;
    el.style.display = 'block';
  }

  document.getElementById('googleBtn').onclick = async () => {
    lobbyID = (document.getElementById('lobbyIn').value || 'GLOBAL').trim().toUpperCase();
    const { error } = await sb.auth.signInWithOAuth({
      provider: 'google',
      options: { redirectTo: window.location.href }
    });
    if (error) showError(error.message);
  };

  // Handle redirect back from Google
  sb.auth.onAuthStateChange(async (event, session) => {
    if (event === 'SIGNED_IN' && session && !currentUser) {
      currentUser = session.user;
      lobbyID = lobbyID || 'GLOBAL';
      startApp(session.user.email);
    }
  });

  document.getElementById('authBtn').onclick = async () => {
    const email = document.getElementById('emailIn').value.trim();
    const pass = document.getElementById('passIn').value;
    lobbyID = (document.getElementById('lobbyIn').value || 'GLOBAL').trim().toUpperCase();
    if (!email || !pass) return showError('Email and password required.');
    document.getElementById('authBtn').textContent = '...';
    if (authMode === 'signup') {
      const { error } = await sb.auth.signUp({ email, password: pass });
      if (error) { showError(error.message); showTab('signup'); return; }
      showError('Check your email to confirm your account, then log in.');
      showTab('login');
    } else {
      const { data, error } = await sb.auth.signInWithPassword({ email, password: pass });
      if (error) { showError(error.message); showTab('login'); return; }
      currentUser = data.user;
      startApp(email);
    }
  };

  async function logout() {
    await sb.auth.signOut();
    location.reload();
  }

  function startApp(email) {
    document.getElementById('authOverlay').style.display = 'none';
    document.getElementById('mainApp').style.display = 'flex';
    document.getElementById('accountName').innerText = email;
    document.getElementById('lobbyLabel').innerText = 'Lobby: ' + lobbyID;
    initMultiplayer(email);
  }

  function initMultiplayer(email) {
    const safeEmail = email.replace(/[^a-zA-Z0-9]/g, '_');
    const masterID = 'CP_HOST_' + lobbyID;
    const myID = 'CP_PEER_' + lobbyID + '_' + safeEmail + '_' + Math.floor(Math.random()*999);

    // Try to claim the host slot
    const masterPeer = new Peer(masterID, { config: { iceServers: [{ url: 'stun:stun.l.google.com:19302' }] } });
    masterPeer.on('open', () => { isHost = true; console.log('I am host'); });
    masterPeer.on('connection', (conn) => setupConnection(conn));
    masterPeer.on('error', () => { /* host slot taken */ });

    // Open client peer
    peer = new Peer(myID, { config: { iceServers: [{ url: 'stun:stun.l.google.com:19302' }] } });
    peer.on('connection', (conn) => setupConnection(conn));
    peer.on('open', () => {
      const conn = peer.connect(masterID);
      if (conn) setupConnection(conn);
    });

    canvas.width = GRID_SIZE; canvas.height = GRID_SIZE;
    autoFit(); render();
    window.addEventListener('resize', autoFit);
  }

  function setupConnection(conn) {
    if (!conn) return;
    conn.on('open', () => {
      if (connections[conn.peer]) return;
      connections[conn.peer] = conn;
      updatePeerCountUI();
      if (isHost) {
        // Push canvas to new joiner immediately
        conn.send({type:'full', grid, size: GRID_SIZE});
        broadcastCount();
      } else if (conn.peer.includes('HOST')) {
        // Ask host for canvas
        conn.send({type:'sync_req'});
      }
    });
    conn.on('data', (data) => {
      if (data.type === 'px') {
        grid[data.y][data.x] = data.c; drawPx(data.x, data.y, data.c);
        if (isHost) broadcastExcept(data, conn.peer);
      } else if (data.type === 'full') {
        GRID_SIZE = data.size || 64; grid = data.grid;
        canvas.width = GRID_SIZE; canvas.height = GRID_SIZE;
        document.getElementById('sizeRange').value = GRID_SIZE;
        document.getElementById('sizeLabel').innerText = GRID_SIZE + ' x ' + GRID_SIZE;
        render(); autoFit();
      } else if (data.type === 'sync_req' && isHost) {
        conn.send({type:'full', grid, size: GRID_SIZE});
      } else if (data.type === 'wipe') {
        grid = Array.from({length:GRID_SIZE},()=>Array(GRID_SIZE).fill('#FFFFFF'));
        render(); if (isHost) broadcastExcept(data, conn.peer);
      } else if (data.type === 'count_update') updatePeerCountUI(data.count);
    });
    conn.on('close', () => {
      delete connections[conn.peer];
      if (isHost) broadcastCount();
      updatePeerCountUI();
    });
  }

  function countUsers() {
    // Only count CP_PEER_ connections, not CP_HOST_ (which is just our own host slot)
    // Also deduplicate by stripping the random suffix from peer IDs
    const seen = new Set();
    for (let id in connections) {
      if (id.startsWith('CP_HOST_')) continue; // skip host connections
      // CP_PEER_LOBBY_username_123 -> strip last _123
      const key = id.replace(/_\d+$/, '');
      seen.add(key);
    }
    return seen.size;
  }
  function broadcastCount() { broadcast({type:'count_update', count: countUsers()}); }
  function updatePeerCountUI(ov) {
    const c = (ov !== undefined) ? ov : countUsers();
    document.getElementById('status').innerText = 'Peers: ' + c;
  }

  document.getElementById('sizeRange').onchange = (e) => {
    if (!confirm('Resizing the grid will wipe the current canvas. Continue?')) { e.target.value = GRID_SIZE; return; }
    GRID_SIZE = parseInt(e.target.value);
    document.getElementById('sizeLabel').innerText = GRID_SIZE + ' x ' + GRID_SIZE;
    grid = Array.from({length:GRID_SIZE},()=>Array(GRID_SIZE).fill('#FFFFFF'));
    canvas.width = GRID_SIZE; canvas.height = GRID_SIZE;
    render(); autoFit();
    broadcast({type:'full', grid, size: GRID_SIZE});
  };

  function setPx(x,y,c) {
    if (x<0||x>=GRID_SIZE||y<0||y>=GRID_SIZE||grid[y][x]===c) return;
    grid[y][x]=c; drawPx(x,y,c);
    broadcast({type:'px', x, y, c});
  }
  function drawLine(x0,y0,x1,y1,c) {
    const dx=Math.abs(x1-x0), dy=Math.abs(y1-y0);
    const sx=(x0<x1)?1:-1, sy=(y0<y1)?1:-1;
    let err=dx-dy;
    while(true) {
      setPx(x0,y0,c); if(x0===x1&&y0===y1) break;
      const e2=2*err; if(e2>-dy){err-=dy;x0+=sx;} if(e2<dx){err+=dx;y0+=sy;}
    }
  }
  function paint(e) {
    if (!isDown) return;
    const rect = canvas.getBoundingClientRect();
    const cx = e.touches ? e.touches[0].clientX : e.clientX;
    const cy = e.touches ? e.touches[0].clientY : e.clientY;
    const x = Math.floor((cx - rect.left) / (rect.width / GRID_SIZE));
    const y = Math.floor((cy - rect.top) / (rect.height / GRID_SIZE));
    if (x<0||x>=GRID_SIZE||y<0||y>=GRID_SIZE) return;
    if (tool === 'fill') { floodFill(x,y,grid[y][x],currentColor); isDown=false; }
    else {
      const c = (tool==='brush'?currentColor:'#FFFFFF');
      if (lastX !== null) drawLine(lastX,lastY,x,y,c); else setPx(x,y,c);
      lastX=x; lastY=y;
    }
  }
  function floodFill(x,y,t,r) {
    if (t===r) return;
    const s=[[x,y]];
    while(s.length) {
      const [cx,cy]=s.pop();
      if(cx<0||cy<0||cx>=GRID_SIZE||cy>=GRID_SIZE||grid[cy][cx]!==t) continue;
      setPx(cx,cy,r); s.push([cx+1,cy],[cx-1,cy],[cx,cy+1],[cx,cy-1]);
    }
  }
  function broadcast(m) { for(let id in connections) if(connections[id].open) connections[id].send(m); }
  function broadcastExcept(m,s) { for(let id in connections) if(id!==s&&connections[id].open) connections[id].send(m); }
  function drawPx(x,y,c) { ctx.fillStyle=c; ctx.fillRect(x,y,1,1); }
  function render() { ctx.clearRect(0,0,canvas.width,canvas.height); for(let y=0;y<GRID_SIZE;y++) for(let x=0;x<GRID_SIZE;x++) drawPx(x,y,grid[y][x]); }
  function autoFit() {
    const wrap = document.getElementById('canvasWrap').getBoundingClientRect();
    const s = Math.min(wrap.width*0.96, wrap.height*0.96);
    canvas.style.width=s+'px'; canvas.style.height=s+'px';
  }

  document.getElementById('brushBtn').onclick = () => { tool='brush'; document.querySelectorAll('.tool').forEach(b=>b.classList.remove('active')); document.getElementById('brushBtn').classList.add('active'); };
  document.getElementById('eraserBtn').onclick = () => { tool='eraser'; document.querySelectorAll('.tool').forEach(b=>b.classList.remove('active')); document.getElementById('eraserBtn').classList.add('active'); };
  document.getElementById('fillBtn').onclick = () => { tool='fill'; document.querySelectorAll('.tool').forEach(b=>b.classList.remove('active')); document.getElementById('fillBtn').classList.add('active'); };
  document.getElementById('undoBtn').onclick = () => { if(history.length){ redoStack.push(JSON.stringify(grid)); grid=JSON.parse(history.pop()); render(); broadcast({type:'full',grid,size:GRID_SIZE}); } };
  document.getElementById('redoBtn').onclick = () => { if(redoStack.length){ history.push(JSON.stringify(grid)); grid=JSON.parse(redoStack.pop()); render(); broadcast({type:'full',grid,size:GRID_SIZE}); } };
  document.getElementById('wipeBtn').onclick = () => { if(confirm('Wipe all?')){ grid=Array.from({length:GRID_SIZE},()=>Array(GRID_SIZE).fill('#FFFFFF')); render(); broadcast({type:'wipe'}); } };
  document.getElementById('exportBtn').onclick = () => { const a=document.createElement('a'); a.download='art.png'; a.href=canvas.toDataURL(); a.click(); };
  document.getElementById('picker').oninput = (e) => { currentColor=e.target.value; document.getElementById('hexInput').value=currentColor; };

  document.getElementById('openSaveMenuBtn').onclick = () => { document.getElementById('saveMenu').style.display='block'; refreshSaveList(); };
  document.getElementById('exitSaveMenuBtn').onclick = () => document.getElementById('saveMenu').style.display='none';

  document.getElementById('menuSaveBtn').onclick = async () => {
    const name = document.getElementById('menuSaveName').value.trim() || 'My Drawing';
    const { error } = await sb.from('saves').upsert({ user_id: currentUser.id, name, data: { grid, size: GRID_SIZE } }, { onConflict: 'user_id,name' });
    if (error) return alert('Save failed: ' + error.message);
    alert('Saved!');
    document.getElementById('menuSaveName').value = '';
    refreshSaveList();
  };

  async function refreshSaveList() {
    const list = document.getElementById('slotList');
    list.innerHTML = '<i style="color:#999; padding:10px; display:block;">Loading...</i>';
    const { data, error } = await sb.from('saves').select('name').eq('user_id', currentUser.id).order('name');
    if (error) { list.innerHTML = '<i style="color:red">Failed to load saves.</i>'; return; }
    if (!data.length) { list.innerHTML = '<i style="color:#999; padding:10px; display:block;">No saves yet.</i>'; return; }
    list.innerHTML = '';
    data.forEach(row => {
      const div = document.createElement('div');
      div.className = 'save-slot';
      div.innerHTML = `<strong>${row.name}</strong><div>
        <button class="load-btn" onclick="loadSave('${row.name}')">Load</button>
        <button class="del-btn" onclick="deleteSave('${row.name}')">Delete</button>
      </div>`;
      list.appendChild(div);
    });
  }

  window.loadSave = async (name) => {
    const { data, error } = await sb.from('saves').select('data').eq('user_id', currentUser.id).eq('name', name).single();
    if (error || !data) return alert('Failed to load.');
    grid = data.data.grid; GRID_SIZE = data.data.size;
    canvas.width=GRID_SIZE; canvas.height=GRID_SIZE;
    render(); autoFit(); broadcast({type:'full',grid,size:GRID_SIZE});
    document.getElementById('saveMenu').style.display='none';
  };

  window.deleteSave = async (name) => {
    if (!confirm(`Delete "${name}"?`)) return;
    await sb.from('saves').delete().eq('user_id', currentUser.id).eq('name', name);
    refreshSaveList();
  };

  const colors=["#D20103","#FF0000","#FF8484","#EC8E01","#FFA500","#FFDC9A","#E2C44B","#FFFF00","#FFFFAE","#226308","#008000","#00FF00","#2227C3","#0000DD","#ADD8E6","#621079","#800080","#CC6CE7","#DCADB6","#FFC0CB","#FFF0F3","#A07D45","#C8A165","#EFD9B8","#FFFFFF","#D3D3D3","#808080","#5F5E5E","#000000"];
  colors.forEach(c => { const s=document.createElement('div'); s.className='swatch'; s.style.background=c; s.onclick=()=>{ currentColor=c; document.getElementById('picker').value=c; document.getElementById('hexInput').value=c; }; document.getElementById('palette').appendChild(s); });

  canvas.onmousedown = (e) => { history.push(JSON.stringify(grid)); isDown=true; paint(e); };
  canvas.ontouchstart = (e) => { e.preventDefault(); history.push(JSON.stringify(grid)); isDown=true; paint(e); };
  window.onmouseup = () => { isDown=false; lastX=lastY=null; };
  window.ontouchend = () => { isDown=false; lastX=lastY=null; };
  canvas.onmousemove = paint;
  canvas.ontouchmove = (e) => { e.preventDefault(); paint(e); };

  // Restore session on page load
  sb.auth.getSession().then(({ data }) => {
    if (data.session) {
      currentUser = data.session.user;
      lobbyID = 'GLOBAL';
      startApp(currentUser.email);
    }
  });
</script>
</body>
</html>
